name: Build & Push

on:
  workflow_call:
    inputs:
      # architectures:
      #   default: [arm64, x86]
      subdirectory:
        type: string
        required: false

jobs:
  metadata:
    runs-on: ubuntu-24.04-arm

    outputs:
      registry: ${{ steps.remote.outputs.registry }}
      repository: ${{ steps.remote.outputs.repository }}
      tags: ${{ steps.meta.outputs.tags }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Visibility
        id: visibility
        run: |
          echo visibility=$(gh api "repos/${{ github.repository }}" --jq .visibility)  >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set remote
        id: remote
        run: |
          echo "registry=${{ steps.visibility.outputs.visibility == 'private' && 'ghcr.io' || '917951871879.dkr.ecr.eu-west-1.amazonaws.com' }}" >> $GITHUB_OUTPUT
          echo "repository=${{ steps.visibility.outputs.visibility == 'private' && github.repository || github.event.repository.name }}${{ inputs.subdirectory && format('/{0}', inputs.subdirectory) || '' }}" >> $GITHUB_OUTPUT

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.remote.outputs.registry }}/${{ steps.remote.outputs.repository }}
          tags: |
            type=sha,prefix=git-
            type=raw,value=edge,enable={{is_default_branch}}


  build:
    needs:
      - metadata

    strategy:
      matrix:
        include:
          - key: linux-amd64
            os: linux
            architecture: amd64
            runner: ubuntu-24.04
          - key: linux-arm64
            os: linux
            architecture: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: AWS Credentials
        if: ${{ needs.metadata.outputs.registry == '917951871879.dkr.ecr.eu-west-1.amazonaws.com'}}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::917951871879:role/GitHubActionsBgOrg
          aws-region: eu-west-1

      - name: ECR Login
        if: ${{ needs.metadata.outputs.registry == '917951871879.dkr.ecr.eu-west-1.amazonaws.com'}}
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 #v2.0.1

      - name: Docker Login
        if: ${{ needs.metadata.outputs.registry == 'ghcr.io' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: "{{defaultContext}}:${{ inputs.subdirectory }}"
          platforms: ${{matrix.os}}/${{matrix.architecture}}
          labels: ${{ needs.metadata.outputs.labels }}
          tags: ${{ needs.metadata.outputs.registry }}/${{ needs.metadata.outputs.repository }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{matrix.key}}
          cache-to: type=gha,mode=max,scope=${{matrix.key}}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ matrix.key }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04

    needs:
      - metadata
      - build

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: AWS Credentials
        if: ${{ needs.metadata.outputs.registry == '917951871879.dkr.ecr.eu-west-1.amazonaws.com'}}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::917951871879:role/GitHubActionsBgOrg
          aws-region: eu-west-1

      - name: ECR Login
        if: ${{ needs.metadata.outputs.registry == '917951871879.dkr.ecr.eu-west-1.amazonaws.com'}}
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 #v2.0.1

      - name: Docker Login
        if: ${{ needs.metadata.outputs.registry == 'ghcr.io' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ needs.metadata.outputs.registry }}/${{ needs.metadata.outputs.repository }}
          tags: |
              type=sha,prefix=git-
              type=raw,value=edge,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '. | map("-t " + .) | join(" ")' <<< '${{ needs.metadata.outputs.tags }}') \
            $(printf '${{ needs.metadata.outputs.registry }}/${{ needs.metadata.outputs.repository }}@sha256:%s ' *) \
            --metadata-file build-push-metadata.json

      - name: Upload metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-push-metadata.json
          path: build-push-metadata.json
